<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <canvas id="canvas" width="800" height="800"></canvas>
    <script>
        const ctx = canvas.getContext("2d")

        const W = canvas.width
        const H = canvas.height
        const BG = "lightgray"
        const FG = "green"

        function desenharFundo(){
            ctx.fillStyle = BG
            ctx.fillRect(0, 0, W, H)
        }

        function mapearCoordenadas({x, y}){
            return {
            x: ((x + 1) / 2) * W,
            y: (1 - (y + 1) / 2) * H
            }
        }

        function desenharPonto({x, y}, color=FG){
            ctx.lineWidth = 5
            ctx.strokeStyle = FG
            ctx.beginPath()
            ctx.arc(x, y, 1, 0, Math.PI * 2)
            ctx.stroke()
        }

        var pontosOrigs = []
        for(let x=-1; x <= 1; x += 0.25)
            for(let y=-1; y <= 1; y += 0.25)
            pontosOrigs.push({x:x, y:y})

        // desenharFundo()
        // pontosOrigs.map(mapearCoordenadas).map(desenharPonto)
        
        function desenharLinha(pi, pf, color=FG){
            ctx.lineWidth = 2
            ctx.strokeStyle = color
            ctx.beginPath()
            ctx.moveTo(pi.x, pi.y)
            ctx.lineTo(pf.x, pf.y)
            ctx.stroke()
        }

        function desenharPoligono(pontos, color=FG){
            ctx.lineWidth = 2
            ctx.strokeStyle = color
            ctx.beginPath()

            ctx.moveTo(pontos[0].x, pontos[0].y)
            for(let i=1; i<pontos.length; i++)
                ctx.lineTo(pontos[i].x, pontos[i].y)
            ctx.closePath()

            ctx.stroke()
        }


        var pontos = [
            {x: 0.25, y: 0.25},
            {x: 0.25, y: -0.25},
            {x: -0.25, y: -0.25},
            {x: -0.25, y: 0.25},
        ]


        // const ps = pontos.map(mapearCoordenadas)
        // ps.map(desenharPonto)
        // desenharPoligono(ps)

        function desenhar(pontos, color=FG){
            const ps = pontos.map(mapearCoordenadas)
            ps.map((ponto) => desenharPonto(ponto, color))
            desenharPoligono(ps, color)
        }


        function transformaPonto({x, y}, mat){
            return {
                x: x * mat[0][0] + y * mat[0][1] + mat[0][2],
                y: x * mat[1][0] + y * mat[1][1] + mat[1][2]
            }
        }

        function matrizParaEscalar(fx, fy){
            return [
                [fx, 0, 0],
                [0, fy, 0],
                [0, 0,  1]
            ]
        }

        // desenharFundo()
        // desenhar(pontos)

        // const matReducao = matrizParaEscalar(0.5, 0.5)
        // const pontosReducao = pontos.map((ponto) => transformaPonto(ponto, matReducao))
        // desenhar(pontosReducao, "red")

        // const matAumento = matrizParaEscalar(1.5, 1.5)
        // const pontosAumento = pontos.map((ponto) => transformaPonto(ponto, matAumento))
        // desenhar(pontosAumento, "blue")

        function matrizDeTranslacao(tx,ty){
            return [
                [1, 0, tx],
                [0, 1, ty],
                [0, 0,  1]
            ]
        }

        // const matTranslacao = matrizDeTranslacao(0.25, 0.25)
        // const pontosTranslacao = pontos.map((ponto) => transformaPonto(ponto, matTranslacao))
        // desenhar(pontosTranslacao, "red")

        function matrizDeRotacao(angulo){
            const cos = Math.cos(angulo)
            const sin = Math.sin(angulo)

            return [
                [cos, -sin, 0],
                [sin, cos,  0],
                [0,     0,  1]
            ]
        }

        // desenharFundo()
        // desenhar(pontos)

        // const matRotacao = matrizDeRotacao(Math.PI / 4)
        // const pontosRotacao = pontos.map((ponto) => transformaPonto(ponto, matRotacao))
        // desenhar(pontosRotacao, "red")

        function gerarFrame(angulo){
            desenharFundo()
            desenhar(pontos)
            const matRotacao = matrizDeRotacao(angulo)
            const pontosRotacao = pontos.map((ponto) => transformaPonto(ponto, matRotacao))
            desenhar(pontosRotacao, "red")
        }

        angulo = Math.PI / 4
        gerarFrame(angulo)

        const FPS = 60
        const TIMEOUT = 1E3 / FPS
        angulo = Math.PI / 4
        setTimeout(gerarFrame, TIMEOUT, angulo)

        function gerarFrame(angulo){
            desenharFundo()
            desenhar(pontos)
            const matRotacao = matrizDeRotacao(angulo)
            const pontosRotacao = pontos.map((ponto) => transformaPonto(ponto, matRotacao))
            desenhar(pontosRotacao, "red")
            setTimeout(gerarFrame, TIMEOUT, angulo + 0.1)
        }







    </script>

    </body>
</html>
